name: Deploy dashboard to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege needed for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Render dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install render deps
        run: pip install jinja2

      - name: Render dashboard from demo-snapshots
        run: python scripts/render_dashboard.py --output-path public/index.html

      - name: Disable Jekyll processing
        run: touch public/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
