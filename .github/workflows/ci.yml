name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python tests + config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema jinja2

      - name: Run Python unit tests
        run: python -m unittest discover -s tests

      - name: Validate example team config
        run: python scripts/validate_config.py config/example-team.yaml

  node:
    name: jira-mcp tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jira-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm ci

      - name: Run jest suite
        run: npm test -- --ci
